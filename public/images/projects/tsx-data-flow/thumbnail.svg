<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">TSX Data Flow render-path analyzer</title>
  <desc id="desc">A static analysis diagram showing TypeScript sources flowing through transformations into JSX render sinks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#263244"/>
      <stop offset="1" stop-color="#4a5568"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#e2e8f0" stroke-width="1">
    <path d="M90 86h1020M90 164h1020M90 242h1020M90 320h1020M90 398h1020M90 476h1020M90 554h1020"/>
    <path d="M130 62v552M258 62v552M386 62v552M514 62v552M642 62v552M770 62v552M898 62v552M1026 62v552"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="84" y="78" width="1032" height="519" rx="22" fill="#f8fafc"/>
    <rect x="84" y="78" width="1032" height="66" rx="22" fill="#111827"/>
    <path d="M84 122h1032v22H84z" fill="#111827"/>
    <circle cx="125" cy="111" r="9" fill="#ef4444"/>
    <circle cx="156" cy="111" r="9" fill="#f59e0b"/>
    <circle cx="187" cy="111" r="9" fill="#22c55e"/>
    <text x="232" y="118" fill="#d1d5db" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">tsx-dataflow --view work-packets</text>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="126" y="202" fill="#0f172a" font-size="38" font-weight="700">Render-path data flow</text>
    <text x="126" y="239" fill="#475569" font-size="22">Sources, transforms, and JSX sinks ranked into cleanup work.</text>
  </g>
  <g fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M215 399 C331 340, 396 317, 514 360 S720 441, 837 356 S1005 279, 1037 308"/>
    <path d="M232 475 C357 478, 421 436, 516 418 S703 365, 817 423 S990 498, 1046 452"/>
    <path d="M219 322 C358 255, 432 259, 545 294 S726 350, 833 298 S986 221, 1036 248"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">
    <g>
      <rect x="126" y="292" width="182" height="72" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <text x="154" y="322" fill="#1e3a8a">props.task</text>
      <text x="154" y="348" fill="#1e40af">source</text>
    </g>
    <g>
      <rect x="409" y="292" width="217" height="72" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
      <text x="439" y="322" fill="#14532d">object pack</text>
      <text x="439" y="348" fill="#166534">view model</text>
    </g>
    <g>
      <rect x="720" y="292" width="202" height="72" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
      <text x="749" y="322" fill="#78350f">fallback</text>
      <text x="749" y="348" fill="#92400e">impossible</text>
    </g>
    <g>
      <rect x="944" y="292" width="126" height="72" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
      <text x="973" y="322" fill="#7f1d1d">JSX</text>
      <text x="973" y="348" fill="#991b1b">sink</text>
    </g>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="126" y="507" width="348" height="42" rx="21" fill="#e2e8f0"/>
    <text x="150" y="535" fill="#334155" font-size="20" font-weight="700">HIGH burden · relay pressure</text>
    <rect x="498" y="507" width="265" height="42" rx="21" fill="#e2e8f0"/>
