<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Three-column loading placeholder for the voice memo review UI</title>
  <desc id="desc">A masthead above three reserved workspace rails: transcript list, transcript document, and evidence detail, each filled with skeleton placeholder lines.</desc>
  <defs>
    <linearGradient id="skeleton" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#ecefeb"/><stop offset="0.48" stop-color="#f7f8f5"/><stop offset="1" stop-color="#e8ece8"/></linearGradient>
    <style>.bg{fill:#f6f5f1}.muted{fill:#65706f}.panel{fill:#fff;stroke:#deded8;stroke-width:1.5}.button{fill:#fff;stroke:#d4d8d2;stroke-width:1.4}.button-dark{fill:#111}.button-text{fill:#1e2020;font:700 17px Inter,system-ui,sans-serif}.button-dark-text{fill:#fff;font:760 14px Inter,system-ui,sans-serif;letter-spacing:.02em}.label{fill:#64716e;font:760 14px Inter,system-ui,sans-serif}.title{fill:#181b1a;font:760 27px Inter,system-ui,sans-serif}.rail-title{fill:#202323;font:740 19px Inter,system-ui,sans-serif}.small{fill:#65706f;font:500 15px Inter,system-ui,sans-serif}.pill{fill:#fff;stroke:#ddddda;stroke-width:1.3}.s{fill:url(#skeleton)}.line{rx:7;ry:7}.control{fill:#fbfbf9;stroke:#d5dbd7;stroke-width:1.2}.divider{stroke:#ededeb;stroke-width:1.2}</style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <g transform="translate(24 28)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">Voice memo review</text>
    <text class="label" x="0" y="48" dominant-baseline="middle">V2CTX TRANSCRIPT REVIEW</text>
    <text class="small" x="216" y="48" dominant-baseline="middle">Loading transcripts</text>
    <rect class="pill" x="423" y="31" width="101" height="28" rx="14"/><text class="small" x="439" y="49" dominant-baseline="middle">Local library</text>
    <g transform="translate(1180 3)"><rect class="button" x="0" y="0" width="68" height="42" rx="6"/><text class="button-text" x="18" y="27">Help</text><rect class="button" x="79" y="0" width="190" height="42" rx="6"/><text class="button-text" x="96" y="27">Refresh recordings</text><rect class="button-dark" x="280" y="0" width="134" height="42" rx="6"/><text class="button-dark-text" x="300" y="27">OPEN PACKAGE</text></g>
  </g>
  <g transform="translate(24 102)">
    <rect class="panel" x="0" y="0" width="300" height="760" rx="8"/><text class="rail-title" x="14" y="30">Transcripts</text><rect class="control" x="270" y="14" width="20" height="26" rx="5"/><rect class="control" x="10" y="54" width="280" height="34" rx="6"/><text class="small" x="22" y="76">Memo name or section</text>
    <g transform="translate(10 104)">
      <rect class="s line" x="0" y="0" width="214" height="13"/><rect class="s line" x="0" y="20" width="92" height="10"/><rect class="s line" x="0" y="37" width="176" height="10"/>
      <rect class="s line" x="0" y="66" width="182" height="13"/><rect class="s line" x="0" y="86" width="98" height="10"/><rect class="s line" x="0" y="103" width="232" height="10"/>
      <rect class="s line" x="0" y="132" width="246" height="13"/><rect class="s line" x="0" y="152" width="84" height="10"/><rect class="s line" x="0" y="169" width="162" height="10"/>
      <rect class="s line" x="0" y="198" width="214" height="13"/><rect class="s line" x="0" y="218" width="92" height="10"/><rect class="s line" x="0" y="235" width="176" height="10"/>
      <rect class="s line" x="0" y="264" width="182" height="13"/><rect class="s line" x="0" y="284" width="98" height="10"/><rect class="s line" x="0" y="301" width="232" height="10"/>
      <rect class="s line" x="0" y="330" width="246" height="13"/><rect class="s line" x="0" y="350" width="84" height="10"/><rect class="s line" x="0" y="367" width="162" height="10"/>
      <rect class="s line" x="0" y="396" width="214" height="13"/><rect class="s line" x="0" y="416" width="92" height="10"/><rect class="s line" x="0" y="433" width="176" height="10"/>
    </g>
    <rect class="panel" x="316" y="0" width="876" height="760" rx="8"/><line class="divider" x1="316" y1="118" x2="1192" y2="118"/><rect class="s line" x="334" y="20" width="318" height="17"/><rect class="s line" x="334" y="50" width="208" height="10"/><rect class="s" x="1084" y="14" width="92" height="38" rx="6"/>
    <rect class="s" x="334" y="78" width="62" height="28" rx="6"/><rect class="s" x="404" y="78" width="62" height="28" rx="6"/><rect class="s" x="474" y="78" width="62" height="28" rx="6"/><rect class="s" x="544" y="78" width="62" height="28" rx="6"/><rect class="s" x="614" y="78" width="62" height="28" rx="6"/><rect class="s" x="684" y="78" width="62" height="28" rx="6"/>
    <rect fill="#fbfbf8" x="317" y="119" width="874" height="70"/><line class="divider" x1="316" y1="189" x2="1192" y2="189"/><rect class="s line" x="334" y="137" width="76" height="10"/><rect class="s line" x="334" y="157" width="760" height="13"/><rect class="s line" x="334" y="176" width="560" height="13"/>
    <g transform="translate(334 218)"><rect class="s line" x="0" y="0" width="420" height="22"/><rect class="s line" x="0" y="52" width="52" height="12"/><rect class="s line" x="70" y="50" width="760" height="15"/><rect class="s line" x="0" y="88" width="52" height="12"/><rect class="s line" x="70" y="86" width="700" height="15"/><rect class="s line" x="0" y="124" width="52" height="12"/><rect class="s line" x="70" y="122" width="816" height="15"/><rect class="s line" x="0" y="160" width="52" height="12"/><rect class="s line" x="70" y="158" width="636" height="15"/><line class="divider" x1="0" y1="198" x2="838" y2="198"/></g>
    <g transform="translate(334 445)"><rect class="s line" x="0" y="0" width="360" height="22"/><rect class="s line" x="0" y="52" width="52" height="12"/><rect class="s line" x="70" y="50" width="720" height="15"/><rect class="s line" x="0" y="88" width="52" height="12"/><rect class="s line" x="70" y="86" width="810" height="15"/><rect class="s line" x="0" y="124" width="52" height="12"/><rect class="s line" x="70" y="122" width="660" height="15"/></g>
    <rect class="panel" x="1208" y="0" width="340" height="760" rx="8"/><text class="rail-title" x="1222" y="34">Audio</text><rect class="s" x="1222" y="55" width="312" height="34" rx="7"/><text class="rail-title" x="1222" y="126">Selected overlay</text><rect class="s line" x="1222" y="158" width="132" height="10"/><rect class="s line" x="1222" y="184" width="268" height="17"/><rect class="s line" x="1222" y="218" width="292" height="13"/><rect class="s line" x="1222" y="241" width="230" height="13"/><line class="divider" x1="1222" y1="288" x2="1534" y2="288"/><text class="rail-title" x="1222" y="330">Related snippets</text>
    <circle class="s" cx="1227" cy="362" r="5"/><rect class="s line" x="1240" y="355" width="230" height="13"/><rect class="s line" x="1240" y="379" width="286" height="10"/><circle class="s" cx="1227" cy="421" r="5"/><rect class="s line" x="1240" y="414" width="194" height="13"/><rect class="s line" x="1240" y="438" width="260" height="10"/><circle class="s" cx="1227" cy="480" r="5"/><rect class="s line" x="1240" y="473" width="250" height="13"/><rect class="s line" x="1240" y="497" width="280" height="10"/>
  </g>
</svg>
